issuer:
  # Name of the ClusterIssuer resource. Referenced by the Ingress's
  # cert-manager.io/cluster-issuer annotation.
  name: "letsencrypt-prod"

  # Contact email for Let's Encrypt — required.
  email: ""

  # ACME server. Override to https://acme-staging-v02.api.letsencrypt.org/directory
  # during testing to avoid the production rate limits.
  server: "https://acme-v02.api.letsencrypt.org/directory"

  # HTTP-01 solver settings (used when dns01.enabled is false).
  # HTTP-01 cannot issue wildcard certs.
  ingressClass: "nginx"

  # DNS-01 solver settings. When dns01.enabled is true, the ClusterIssuer uses
  # DNS-01 instead of HTTP-01 — required for wildcard certs. Authentication is
  # via Azure Workload Identity: cert-manager's controller pod is annotated
  # with the managed identity's client ID and exchanges its projected SA token
  # for an Azure AD token at solve time. No static credentials are stored.
  dns01:
    enabled: false
    azureDNS:
      subscriptionID: ""
      resourceGroupName: ""
      hostedZoneName: ""
      environment: "AzurePublicCloud"
      managedIdentityClientID: ""
