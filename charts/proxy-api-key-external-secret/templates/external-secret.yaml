{{- $provider := .Values.secretStore.provider -}}
{{- if not (or (eq $provider "aws") (eq $provider "azure")) -}}
{{- fail (printf "secretStore.provider must be one of: aws, azure (got %q)" $provider) -}}
{{- end -}}
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: {{ .Values.secretStore.name | quote }}
spec:
  provider:
    {{- if eq $provider "aws" }}
    aws:
      service: SecretsManager
      region: {{ .Values.secretStore.aws.region | quote }}
      auth:
        jwt:
          serviceAccountRef:
            name: {{ .Values.secretStore.serviceAccountName | quote }}
            namespace: {{ .Values.secretStore.serviceAccountNamespace | quote }}
    {{- else if eq $provider "azure" }}
    azurekv:
      vaultUrl: {{ .Values.secretStore.azure.keyVaultUrl | quote }}
      tenantId: {{ .Values.secretStore.azure.tenantId | quote }}
      authType: WorkloadIdentity
      serviceAccountRef:
        name: {{ .Values.secretStore.serviceAccountName | quote }}
        namespace: {{ .Values.secretStore.serviceAccountNamespace | quote }}
    {{- end }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.externalSecret.name | quote }}
  namespace: {{ .Values.externalSecret.namespace | quote }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.secretStore.name | quote }}
    kind: ClusterSecretStore
  target:
    name: {{ .Values.externalSecret.targetSecretName | quote }}
  data:
    - secretKey: {{ .Values.externalSecret.targetSecretKey | quote }}
      remoteRef:
        key: {{ .Values.externalSecret.remoteKey | quote }}
        {{- if .Values.externalSecret.remoteProperty }}
        property: {{ .Values.externalSecret.remoteProperty | quote }}
        {{- end }}
